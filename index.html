<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug 1.0.2</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,Arial,sans-serif;
}

body{
    background:#0d1117;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#161b22;
    border:1px solid #30363d;
    border-radius:20px;
    padding:40px 30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.45);
}

.logo{
    width:80px;
    height:80px;
    margin:0 auto 20px;
    border-radius:18px;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo svg{
    width:40px;
    height:40px;
    fill:white;
}

h1{
    font-size:28px;
    margin-bottom:8px;
}

.version{
    color:#8b949e;
    margin-bottom:30px;
    font-size:15px;
}

.btn{
    width:100%;
    height:54px;
    border:none;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    text-decoration:none;
    transition:.25s;
    margin-bottom:15px;
}

.download{
    background:#238636;
    color:white;
}

.download:hover{
    background:#2ea043;
}

.copy{
    background:#21262d;
    color:white;
    border:1px solid #30363d;
}

.copy:hover{
    background:#30363d;
}

.btn svg{
    width:20px;
    height:20px;
    fill:currentColor;
}

#status{
    margin-top:12px;
    color:#58a6ff;
    font-size:14px;
    min-height:20px;
}

.footer{
    margin-top:30px;
    color:#6e7681;
    font-size:13px;
}
</style>

</head>
<body>

<div class="card">

<div class="logo">
<svg viewBox="0 0 24 24">
<path d="M5 20h14v-2H5v2zm7-18l-5.5 5.5h3.5V15h4V7.5H17.5L12 2z"/>
</svg>
</div>

<h1>Debug 1.0.2</h1>
<p class="version">Latest Android Build</p>

<a class="btn download"
   href="app/debug1.0.2.apk"
   download>

<svg viewBox="0 0 24 24">
<path d="M5 20h14v-2H5v2zm7-18v10.17l3.59-3.58L17 10l-5 5-5-5 1.41-1.41L11 12.17V2h1z"/>
</svg>

Download APK

</a>

<button class="btn copy" onclick="copyLink()">

<svg viewBox="0 0 24 24">
<path d="M16 1H4c-1.1 0-2 .9-2 2v12h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
</svg>

Copy Download Link

</button>

<p id="status"></p>

<div class="footer">
Secure Direct Download
</div>

</div>

<script>
function copyLink(){

    const link = window.location.origin + "/accountmanager/update/app-debug.apk";

    navigator.clipboard.writeText(link).then(()=>{
        document.getElementById("status").innerText =
        "Download link copied successfully.";
    }).catch(()=>{
        prompt("Copy this link:",link);
    });

}
</script>

</body>
</html>
